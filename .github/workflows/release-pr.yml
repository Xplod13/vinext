name: Release PR

# Workflow A (see CHANGESETS_MIGRATION_PLAN architecture). On every push to
# `main` this:
#   1. Auto-generates changesets from Conventional Commits into the WORKING TREE
#      only (scripts/create-changeset.mjs). These `auto-*.md` files are never
#      committed to `main`; they live just long enough for the action below.
#   2. Runs `changesets/action` in *version-only* mode (NO `publish:` input) to
#      maintain a rolling "Version Packages" PR. The action's `version:` command
#      is scripts/version.mjs (`changeset version` + the `## Contributors` list).
#
# Publishing is intentionally NOT done here — it stays in publish.yml so the
# OIDC trusted-publishing flow (`vp pm publish ... --provenance`) is preserved.

on:
  push:
    branches: [main]

concurrency:
  group: changesets-release-pr
  cancel-in-progress: false

permissions: {}

jobs:
  release-pr:
    name: Maintain Version PR
    if: github.repository_owner == 'cloudflare'
    runs-on: ubuntu-latest
    permissions:
      contents: write # changesets/action commits the Version PR branch
      pull-requests: write # ...and opens/updates the PR
    steps:
      # zizmor: ignore[artipacked] persisted creds are required for
      # changesets/action to push the Version Packages branch + open the PR.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history + tags for the correctness-rule guard

      - uses: ./.github/actions/setup

      - name: Generate changesets from Conventional Commits
        run: node scripts/create-changeset.mjs

      - name: Create / update Version PR
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          # version-only: bump versions, write CHANGELOG.md, append contributors.
          # Deliberately NO `publish:` input — publishing lives in publish.yml.
          version: node scripts/version.mjs
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
