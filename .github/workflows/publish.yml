name: Publish to npm

# Workflow B (see CHANGESETS_MIGRATION_PLAN architecture). Runs on every push to
# `main`, but a GUARD ensures it only publishes when a "Version Packages" PR was
# just merged — i.e. when packages/vinext/package.json `version` is greater than
# the latest published npm version (fallback: latest `v*` git tag).
#
# Version numbers now come entirely from `changeset version` (no manual bump
# here). Publishing still uses OIDC trusted publishing via `vp pm publish ...
# --provenance` — this is deliberately NOT `changeset publish`, so provenance is
# preserved.

on:
  push:
    branches: [main]
  # Manual fallback (e.g. to re-run a publish). The guard still applies.
  workflow_dispatch: {}

concurrency:
  group: npm-publish
  cancel-in-progress: true

permissions: {}

jobs:
  # ── Guard ──────────────────────────────────────────────────────────────────
  # Decide whether package.json's version is ahead of what's published. Only
  # when it is (a Version PR merged) do the downstream jobs run.
  guard:
    name: Should publish?
    if: github.repository_owner == 'cloudflare'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      version: ${{ steps.check.outputs.version }}
      previous: ${{ steps.check.outputs.previous }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Compare package.json version against published
        id: check
        working-directory: packages/vinext
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view vinext version 2>/dev/null || echo "0.0.0")
          echo "package.json version: ${VERSION}"
          echo "published version:    ${PUBLISHED}"

          # semver-greater check: is $VERSION strictly greater than $PUBLISHED?
          HIGHEST=$(printf '%s\n%s\n' "$VERSION" "$PUBLISHED" | sort -V | tail -1)
          if [ "$VERSION" != "$PUBLISHED" ] && [ "$HIGHEST" = "$VERSION" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} > published ${PUBLISHED}; will publish."
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "No new version to publish."
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "previous=${PUBLISHED}" >> "$GITHUB_OUTPUT"

  ci:
    name: CI Gate
    needs: guard
    if: needs.guard.outputs.should_publish == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish
    needs: [guard, ci]
    if: needs.guard.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      VERSION: ${{ needs.guard.outputs.version }}
      PREVIOUS_VERSION: ${{ needs.guard.outputs.previous }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3 # zizmor: ignore[artipacked] persisted creds are required for `git push origin v$VERSION` in the Tag release step
        with:
          fetch-depth: 0 # full history for changelog/contributor generation

      - uses: ./.github/actions/setup

      - name: Build
        run: vp run build

      # No manual version bump: `version` is already set by `changeset version`
      # (consumed from package.json above). We publish exactly what is in the tree.
      - name: Publish (OIDC trusted publishing)
        working-directory: packages/vinext
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
        run: vp pm publish --no-git-checks --access public -- --provenance

      - name: Tag release
        run: |
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      # Prefer the freshly-written CHANGELOG.md section (which already includes
      # the `## Contributors` list produced by scripts/version.mjs) as the
      # GitHub Release body, so the release notes match the committed changelog
      # exactly. Fall back to a commit link if the section can't be extracted.
      - name: Extract CHANGELOG section for this version
        id: notes
        env:
          REPOSITORY: ${{ github.repository }}
        run: |
          CHANGELOG="packages/vinext/CHANGELOG.md"
          NOTES=""
          if [ -f "$CHANGELOG" ]; then
            # Print lines from "## <VERSION>" up to (but excluding) the next "## ".
            NOTES=$(awk -v ver="## ${VERSION}" '
              $0 == ver { capture=1; next }
              capture && /^## / { exit }
              capture { print }
            ' "$CHANGELOG")
          fi
          if [ -z "$(echo "$NOTES" | tr -d '[:space:]')" ]; then
            NOTES="See commits: https://github.com/${REPOSITORY}/commits/v${VERSION}"
          fi
          {
            echo "text<<EOFMARKER"
            echo "$NOTES"
            echo "EOFMARKER"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          NOTES: ${{ steps.notes.outputs.text }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file - \
            --repo "${REPOSITORY}" <<< "${NOTES}"

      - name: Notify Google Chat
        if: success()
        continue-on-error: true
        env:
          GOOGLE_CHAT_WEBHOOK: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
          NOTES: ${{ steps.notes.outputs.text }}
        run: |
          PAYLOAD=$(jq -n \
            --arg version "$VERSION" \
            --arg summary "$NOTES" \
            '{"text": ("*vinext v" + $version + " published to npm*\n\n" + $summary + "\n\nnpm: https://www.npmjs.com/package/vinext/v/" + $version)}')

          echo "::group::Webhook payload"
          echo "$PAYLOAD"
          echo "::endgroup::"

          RESPONSE=$(curl -sS -w "\nHTTP %{http_code}" -X POST "$GOOGLE_CHAT_WEBHOOK" \
            -H "Content-Type: application/json; charset=UTF-8" \
            -d "$PAYLOAD")

          echo "$RESPONSE"
