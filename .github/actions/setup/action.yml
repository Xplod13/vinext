name: Setup
description: Setup

inputs:
  node-version:
    description: Node.js version to use
    required: false
    default: "24"
  cache:
    description: Whether to enable caching for Vite+ dependencies
    required: false
    default: true
  run-install:
    description: Whether to run `vp install` after setup
    required: false
    default: true

runs:
  using: composite
  steps:
    - name: Setup Vite+
      uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ inputs.cache }}
        run-install: ${{ inputs.run-install }}
